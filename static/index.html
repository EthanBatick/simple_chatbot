<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(0, 255, 170, 0.18), transparent 35%),
                radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.22), transparent 40%),
                #07090f;
            color: white;
        }

        body {
            padding: 30px;
        }

        #chat {
            max-width: 700px;
            margin: auto;
            background: rgba(14, 18, 30, 0.88);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid rgba(0, 255, 170, 0.35);
            box-shadow:
                0 0 25px rgba(0, 255, 170, 0.18),
                0 0 60px rgba(0, 140, 255, 0.12),
                inset 0 0 25px rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-top: 0;
            color: #7CFFCC;
            text-shadow:
                0 0 8px rgba(124, 255, 204, 0.8),
                0 0 22px rgba(0, 255, 170, 0.35);
            letter-spacing: 1px;
        }

        #messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 170, 0.22);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 14px;
            background:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                rgba(2, 5, 12, 0.92);
            background-size: 24px 24px;
            box-shadow:
                inset 0 0 20px rgba(0, 255, 170, 0.08),
                0 0 20px rgba(0, 0, 0, 0.35);
        }

        #messages::-webkit-scrollbar {
            width: 8px;
        }

        #messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #00ffaa;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ffaa;
        }

        .user {
            color: #74b9ff;
            margin-bottom: 12px;
            word-wrap: break-word;
            padding: 10px 12px;
            border-left: 3px solid #2d9cff;
            background: rgba(45, 156, 255, 0.08);
            border-radius: 8px;
            text-shadow: 0 0 8px rgba(45, 156, 255, 0.35);
        }

        .bot {
            color: #7CFF7C;
            margin-bottom: 12px;
            word-wrap: break-word;
            padding: 10px 12px;
            border-left: 3px solid #00ffaa;
            background: rgba(0, 255, 170, 0.08);
            border-radius: 8px;
            text-shadow: 0 0 8px rgba(124, 255, 124, 0.35);
        }

        #inputRow {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 170, 0.35);
            background: rgba(3, 7, 15, 0.95);
            color: white;
            outline: none;
            box-shadow:
                inset 0 0 12px rgba(0, 255, 170, 0.08),
                0 0 14px rgba(0, 255, 170, 0.08);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        input:focus {
            border-color: #00ffaa;
            box-shadow:
                0 0 12px rgba(0, 255, 170, 0.45),
                inset 0 0 12px rgba(0, 255, 170, 0.1);
        }

        button {
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 170, 0.6);
            color: #06110d;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffaa, #4aa3ff);
            box-shadow:
                0 0 14px rgba(0, 255, 170, 0.35),
                0 0 24px rgba(74, 163, 255, 0.25);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow:
                0 0 20px rgba(0, 255, 170, 0.55),
                0 0 34px rgba(74, 163, 255, 0.35);
        }

        button:active {
            transform: scale(0.98);
        }

        /* iPhone / small screen formatting */
        @media screen and (max-width: 600px) {
            body {
                padding: 0;
                background:
                    radial-gradient(circle at top, rgba(0, 255, 170, 0.18), transparent 35%),
                    radial-gradient(circle at bottom, rgba(0, 140, 255, 0.20), transparent 45%),
                    #07090f;
            }

            #chat {
                width: 100%;
                min-height: 100dvh;
                border-radius: 0;
                padding: 16px;
                display: flex;
                flex-direction: column;
                border-left: none;
                border-right: none;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 12px;
                text-align: center;
            }

            #messages {
                flex: 1;
                height: auto;
                min-height: 0;
                font-size: 16px;
                padding: 12px;
            }

            #inputRow {
                flex-direction: column;
                padding-bottom: env(safe-area-inset-bottom);
            }

            input {
                width: 100%;
                font-size: 16px;
                padding: 14px;
            }

            button {
                width: 100%;
                font-size: 17px;
                padding: 14px;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>

<div id="chat">
    <h1>My Chatbot</h1>

    <div id="messages"></div>

    <div id="inputRow">
        <input id="messageInput" placeholder="Type a message..." autocomplete="off" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const messages = document.getElementById("messages");

        const message = input.value.trim();

        if (message === "") {
            return;
        }

        messages.innerHTML += `<div class="user"><b>You:</b> ${escapeHtml(message)}</div>`;
        input.value = "";

        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        messages.innerHTML += `<div class="bot"><b>Bot:</b> ${escapeHtml(data.response)}</div>`;
        messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById("messageInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
