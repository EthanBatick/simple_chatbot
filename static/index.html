<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        body {
            padding: 30px;
        }

        #chat {
            max-width: 700px;
            margin: auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            margin-top: 0;
        }

        #messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #000;
        }

        .user {
            color: #70aaff;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        .bot {
            color: #7CFF7C;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        #inputRow {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
        }

        /* iPhone / small screen formatting */
        @media screen and (max-width: 600px) {
            body {
                padding: 0;
                background: #1e1e1e;
            }

            #chat {
                width: 100%;
                min-height: 100dvh;
                border-radius: 0;
                padding: 16px;
                display: flex;
                flex-direction: column;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 12px;
            }

            #messages {
                flex: 1;
                height: auto;
                min-height: 0;
                font-size: 16px;
                padding: 12px;
            }

            #inputRow {
                flex-direction: column;
                padding-bottom: env(safe-area-inset-bottom);
            }

            input {
                width: 100%;
                font-size: 16px;
                padding: 14px;
            }

            button {
                width: 100%;
                font-size: 17px;
                padding: 14px;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>

<div id="chat">
    <h1>My Chatbot</h1>

    <div id="messages"></div>

    <div id="inputRow">
        <input id="messageInput" placeholder="Type a message..." autocomplete="off" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const messages = document.getElementById("messages");

        const message = input.value.trim();

        if (message === "") {
            return;
        }

        messages.innerHTML += `<div class="user"><b>You:</b> ${escapeHtml(message)}</div>`;
        input.value = "";

        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        messages.innerHTML += `<div class="bot"><b>Bot:</b> ${escapeHtml(data.response)}</div>`;
        messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById("messageInput").addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
